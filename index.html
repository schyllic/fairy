<!DOCTYPE html>
<html lang="en" data-theme="fairy" data-variant="a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fairy Calendar — Year 12026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="theme-color" content="#180b2e">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="toolbar">
  <div id="toolbar-top">
    <div class="toolbar-group" id="mode-btns">
      <button class="btn mode-btn" data-mode="sky"><span class="label-long"></span><span class="label-short"></span></button>
      <button class="btn span-btn" data-span="month"><span class="label-long">Month</span><span class="label-short">Mo</span></button>
      <button class="btn span-btn" data-span="week"><span class="label-long">Week</span><span class="label-short">Wk</span></button>
    </div>
    <div class="toolbar-group" id="date-nav">
      <button class="btn nav-btn cal-only" id="prev-year" title="Previous year">&#8249;</button>
      <button class="btn sky-only" id="sky-back" title="Reverse">&#9664;</button>
      <input type="date" id="date-input" title="Pick a date">
      <button class="btn nav-btn cal-only" id="next-year" title="Next year">&#8250;</button>
      <button class="btn sky-only" id="sky-play" title="Play">&#9654;</button>
    </div>
    <button class="btn" id="today-btn" title="Today">Today</button>
    <span id="toolbar-moon" class="cal-only"></span>
    <button class="btn" id="toolbar-toggle" title="Options">&#9662;</button>
    <div id="sky-inline-controls" hidden>
      <button class="btn toggle-btn" id="sky-labels-btn" title="Toggle labels"></button>
      <button class="btn toggle-btn" id="sky-moon-btn" title="Toggle moon">Moon</button>
      <button class="btn toggle-btn" id="sky-pawnee-btn" title="Skidi Pawnee sky culture">Pawnee</button>
      <button class="btn toggle-btn" id="sky-hindu-btn" title="Jyotisha Hindu sky culture">Jyotisha</button>
      <button class="btn" id="sky-zoom-reset" hidden title="Reset zoom">⊙</button>
    </div>
    <div id="toolbar-utils">
      <button class="btn" id="settings-btn" title="Settings">🗺</button>
      <button class="btn" id="help-btn" title="About this calendar">?</button>
      <button class="btn" id="print-btn" title="Print / Save as PDF">⎙</button>
      <a class="btn" href="https://github.com/schyllic/fairy/" target="_blank" rel="noopener" title="View source on GitHub" style="text-decoration:none;display:inline-flex;align-items:center"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
    </div>
  </div>
  <div id="toolbar-collapsible" hidden>
    <div class="toolbar-group cal-only" id="theme-group">
      <span class="toolbar-label" id="label-theme">Theme:</span>
      <button class="btn theme-btn" data-theme="fairy">Fairy</button>
      <button class="btn theme-btn" data-theme="wizard">Wizard</button>
      <button class="btn theme-btn" data-theme="celtic">Celtic</button>
      <button class="btn theme-btn" data-theme="animal">Animal</button>
      <button class="btn theme-btn" data-theme="flower">Flower</button>
    </div>
    <div id="palette-utils-row">
      <div class="toolbar-group" id="variant-group">
        <span class="toolbar-label" id="label-color">Color:</span>
        <button class="btn" id="scheme-toggle" title="Light/dark mode">🌙</button>
      </div>
      <div class="toolbar-group" id="utils-mobile">
        <button class="btn" id="settings-btn-m">🗺</button>
        <button class="btn" id="help-btn-m">?</button>
        <button class="btn" id="print-btn-m">⎙</button>
        <a class="btn" href="https://github.com/schyllic/fairy/" target="_blank" rel="noopener" title="View source on GitHub" style="text-decoration:none;display:inline-flex;align-items:center"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
      </div>
    </div>
    <div class="toolbar-group cal-only" id="toggles-group">
      <button class="btn toggle-btn" id="toggle-mythic-week" title="Use Norse mythological weekday names">Mythic Week</button>
      <button class="btn toggle-btn" id="toggle-holidays" title="US federal holidays">Holidays</button>
      <button class="btn toggle-btn" id="toggle-birthdays" title="Birthdays">Birthdays</button>
      <button class="btn toggle-btn" id="toggle-meteors" title="Meteor showers">Meteors</button>
      <button class="btn toggle-btn" id="toggle-comets" title="Comets">Comets</button>
    </div>
  </div>
</header>

<main id="calendar-root">
  <div class="loading">Loading calendar…</div>
</main>

<script src="i18n.js"></script>
<script src="settings.js"></script>
<script src="cities.js"></script>
<script src="birthdays.js"></script>
<script src="comets.js"></script>
<script src="holidays.js"></script>
<script src="stars.js"></script>
<script src="constellations.js"></script>
<script src="astro.js"></script>
<script src="calendar.js"></script>
<script src="themes.js"></script>
<script src="hebrew.js"></script>
<script src="cherokee.js"></script>
<script src="iroquois.js"></script>
<script src="skidipawnee.js"></script>
<script src="hindu.js"></script>
<script src="render.js"></script>
<script src="help.js"></script>
<script src="app.js"></script>

</body>
</html>
